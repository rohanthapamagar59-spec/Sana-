<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Sanu ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#000;
    color:white;
    overflow:hidden;
    text-align:center;
}

section{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#movie,#ending{
    display:none;
}

#intro{
    background:linear-gradient(#000,#240046,#000);
}

h1{
    font-size:50px;
    color:#ff4d6d;
    animation:glow 2s infinite alternate;
}

p{
    font-size:20px;
    margin-top:15px;
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:50px;
    background:#ff2d55;
    color:white;
    margin-top:30px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.1);
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #ff4d6d;
    }
    to{
        text-shadow:0 0 30px #ff99aa;
    }
}

.heart{
    position:absolute;
    color:#ff4d6d;
    animation:fall 5s linear infinite;
}

@keyframes fall{
    0%{
        transform:translateY(-100px);
        opacity:1;
    }
    100%{
        transform:translateY(100vh);
        opacity:0;
    }
}

</style>
</head>
<body>

<section id="intro">
    <h1>Happy Birthday Sanu ❤️</h1>
    <p>I have a little surprise for you ✨</p>

    <button onclick="startMovie()">Open Surprise 🎁</button>
</section>


<section id="movie">

    <h1>🎂 Happy Birthday Sanu 🎂</h1>

    <p>
        May your day be filled with happiness,<br>
        love and endless smiles ❤️
    </p>

    <p>
        You are a very special person in my life 🌹
    </p>

    <button onclick="showEnding()">Continue ❤️</button>

</section>


<section id="ending">

    <h1>❤️ Forever Special ❤️</h1>

    <p>
        Once again,<br>
        Happy Birthday Sanu 🎉
    </p>

</section>


<script>

function startMovie(){

    document.getElementById("intro").style.display="none";
    document.getElementById("movie").style.display="flex";

}


function showEnding(){

    document.getElementById("movie").style.display="none";
    document.getElementById("ending").style.display="flex";

}


// Falling hearts

setInterval(()=>{

    let heart=document.createElement("div");

    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"%";
    heart.style.fontSize=(15+Math.random()*30)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);

},300);


</script>

</body>
</html>
